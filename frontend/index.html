<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Visualizer</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">

  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body>
  <div class="split-container">

    <div class="left-pane">
      <h2>Eingabe</h2>
      <div id="editor-container">
      </div>
      <div id="controls">
        <label for="vis-type">Ansicht: </label>
        <select id="vis-type">
          <option value="ast">Abstract Syntax Tree (Klassen)</option>
          <option value="inheritance">Vererbung (Demnächst)</option>
          <option value="dataflow">Datenfluss (Demnächst)</option>
        </select>

        <button id="visualize-btn">Code visualisieren</button>
      </div>
    </div>

    <div class="right-pane">
      <h2>Visualisierung</h2>
      <div id="graph-container">
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script src="editor.js"></script>
</body>

</html>
