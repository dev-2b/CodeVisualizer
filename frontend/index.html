<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Visualizer</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">

  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body>
  <div class="split-container">

    <div class="left-pane">
      <h2>Eingabe</h2>
      <div id="file-controls" style="margin-bottom: 10px;">
        <input type="file" id="folder-upload" webkitdirectory multiple>
      </div>

      <div id="editor-tabs"
        style="display: flex; background: #2d2d2d; color: white; overflow-x: auto; font-family: sans-serif; font-size: 14px;">
      </div>

      <div id="editor-container" style="width:800px; height:600px; border:1px solid #ccc;"></div>
      <div id="editor-container">
      </div>
      <div id="controls">
        <label for="vis-type">Ansicht: </label>
        <select id="vis-type">
          <option value="ast">Abstract Syntax Tree</option>
          <option value="inheritance">Vererbung (Demnächst)</option>
          <option value="dataflow">Datenfluss (Demnächst)</option>
        </select>

        <button id="visualize-btn">Code visualisieren</button>
      </div>
    </div>

    <div class="right-pane">
      <h2>Visualisierung</h2>
      <div id="graph-container">
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <script src="editor.js"></script>
  <script src="graph.js"></script>
  <script src="app.js"></script>

</body>

</html>
